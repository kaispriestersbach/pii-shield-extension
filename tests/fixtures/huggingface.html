<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>HuggingFace Chat – Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #f9fafb; color: #111827; }
    textarea {
      width: 100%; min-height: 48px; padding: 12px; resize: none;
      background: #ffffff; border: 1px solid #d1d5db; border-radius: 8px;
      color: #111827; font-size: 16px; outline: none; box-sizing: border-box;
    }
    #response-area { margin-top: 1rem; padding: 1rem; background: #f3f4f6; border-radius: 8px; min-height: 80px; }
  </style>
</head>
<body>
  <h2>HuggingFace Chat Fixture</h2>
  <textarea
    placeholder="Ask anything"
    rows="2"
    aria-label="Ask anything"
  ></textarea>
  <div id="response-area" data-testid="response">
    Max Mustermann schrieb an max@test.de eine Nachricht.
  </div>
</body>
</html>
