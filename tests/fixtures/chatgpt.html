<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>ChatGPT – Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #212121; color: #ececec; }
    #prompt-textarea {
      width: 100%; min-height: 48px; padding: 12px;
      background: #2f2f2f; border: 1px solid #555; border-radius: 8px;
      color: #ececec; font-size: 16px; outline: none;
    }
    #response-area { margin-top: 1rem; padding: 1rem; background: #1a1a1a; border-radius: 8px; min-height: 80px; }
  </style>
</head>
<body>
  <h2>ChatGPT Fixture</h2>
  <div
    id="prompt-textarea"
    contenteditable="true"
    data-placeholder="Message ChatGPT"
    role="textbox"
    aria-multiline="true"
    aria-label="Message ChatGPT"
  ></div>
  <div id="response-area" data-testid="response">
    Max Mustermann schrieb an max@test.de eine Nachricht.
  </div>
</body>
</html>
