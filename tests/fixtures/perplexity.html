<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Perplexity – Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #16191e; color: #d4d4d4; }
    textarea {
      width: 100%; min-height: 48px; padding: 12px; resize: none; overflow: hidden;
      background: #1e2229; border: 1px solid #2e3440; border-radius: 12px;
      color: #d4d4d4; font-size: 16px; outline: none; box-sizing: border-box;
    }
    #response-area { margin-top: 1rem; padding: 1rem; background: #10121a; border-radius: 8px; min-height: 80px; }
  </style>
</head>
<body>
  <h2>Perplexity Fixture</h2>
  <form>
    <textarea
      placeholder="Ask anything..."
      rows="1"
      aria-label="Ask anything"
      class="overflow-hidden"
    ></textarea>
  </form>
  <div id="response-area" data-testid="response">
    Max Mustermann schrieb an max@test.de eine Nachricht.
  </div>
</body>
</html>
