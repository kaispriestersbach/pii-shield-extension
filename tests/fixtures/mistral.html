<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mistral – Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #0d1117; color: #c9d1d9; }
    textarea {
      width: 100%; min-height: 48px; padding: 12px; resize: none;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      color: #c9d1d9; font-size: 16px; outline: none; box-sizing: border-box;
    }
    #response-area { margin-top: 1rem; padding: 1rem; background: #0a0e14; border-radius: 8px; min-height: 80px; }
  </style>
</head>
<body>
  <h2>Mistral Fixture</h2>
  <textarea
    placeholder="Ask anything to Mistral..."
    rows="2"
    aria-label="Chat input"
  ></textarea>
  <div id="response-area" data-testid="response">
    Max Mustermann schrieb an max@test.de eine Nachricht.
  </div>
</body>
</html>
